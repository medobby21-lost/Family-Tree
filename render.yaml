databases:
  - name: family-tree-db
    plan: free
    databaseName: family_tree
    user: family_tree_user

services:
  - type: web
    name: family-tree
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    releaseCommand: "python manage.py migrate --noinput"
    startCommand: "gunicorn --chdir . Fam.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "family-tree.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: family-tree-db
          property: connectionString
